name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hrms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hrms?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/hrms?schema=public
      AUTH_SECRET: ci-secret-change-me
      NEXTAUTH_SECRET: ci-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No package-lock.json is committed (removed deliberately -- see
      # d19e62f -- because npm ci was failing on Vercel from lockfile/
      # package.json drift; installCommand there is npm install too, see
      # vercel.json). setup-node's cache:npm option and npm ci both hard-
      # require a lockfile to exist, so neither is usable here.
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run build
