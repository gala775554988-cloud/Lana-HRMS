name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hrms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hrms?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/hrms?schema=public
      AUTH_SECRET: ci-secret-change-me
      NEXTAUTH_SECRET: ci-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # package-lock.json is committed and kept in sync with package.json --
      # it was previously removed (see d19e62f) after drifting out of sync
      # with package.json caused npm ci to fail, which let dependency
      # versions float uncontrolled between Vercel builds (root cause of
      # several "works locally, breaks on Vercel" production crashes).
      # Regenerated fresh; keep both files in sync going forward by running
      # npm install (not npm install --no-save) whenever adding a dependency.
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run build
