services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hrms?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/hrms?schema=public
      AUTH_SECRET: local-development-secret-change-me
      NEXTAUTH_SECRET: local-development-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
volumes:
  postgres-data:
