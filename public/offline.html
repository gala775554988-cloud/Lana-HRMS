<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <title>Lana HRMS - غير متصل</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc 52%, #e0f2fe);
        color: #0f172a;
      }
      .card {
        width: min(100%, 440px);
        border: 1px solid rgba(99, 102, 241, 0.22);
        border-radius: 28px;
        background: rgba(255,255,255,0.86);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        padding: 28px;
        text-align: center;
        backdrop-filter: blur(16px);
      }
      .icon {
        display: inline-grid;
        place-items: center;
        width: 82px;
        height: 82px;
        border-radius: 26px;
        border: 1px solid rgba(100, 116, 139, 0.25);
        background: #ffffff;
        overflow: hidden;
        box-shadow: 0 16px 36px rgba(79, 70, 229, 0.22);
      }
      .icon img { width: 100%; height: 100%; object-fit: contain; padding: 6px; box-sizing: border-box; }
      h1 { margin: 20px 0 8px; font-size: 1.55rem; }
      p { margin: 0; color: #475569; line-height: 1.9; }
      button, a {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 16px;
        background: #4f46e5;
        color: white;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body { background: linear-gradient(135deg, #0f172a, #111827 52%, #172554); color: #f8fafc; }
        .card { background: rgba(15, 23, 42, 0.84); border-color: rgba(129, 140, 248, 0.24); }
        p { color: #cbd5e1; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon"><img src="/brand/lana-logo.png" alt="Lana HRMS" /></div>
      <h1>أنت غير متصل بالإنترنت</h1>
      <p>يحتاج نظام Lana HRMS إلى اتصال بالإنترنت للوصول الآمن إلى الحسابات والبيانات. تأكد من الاتصال ثم حاول مرة أخرى.</p>
      <button type="button" onclick="location.reload()">إعادة المحاولة</button>
    </main>
  </body>
</html>
